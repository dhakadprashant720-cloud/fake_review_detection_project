<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Amazon Review Extractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #f5a623;
      --accent2: #ff6b35;
      --text: #f0ede8;
      --muted: #666;
      --green: #4ade80;
      --red: #f87171;
      --blue: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 800;
      letter-spacing: 0.02em; text-transform: uppercase;
    }
    .header-text p {
      font-size: 10px; color: var(--muted);
      font-family: 'DM Mono', monospace; margin-top: 1px;
    }

    .body { padding: 14px 16px; }

    .status-bar {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 11px; margin-bottom: 12px;
      font-family: 'DM Mono', monospace; font-size: 11px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.err { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .dot.pulse { background: var(--accent); animation: pulse 0.9s ease-in-out infinite; }
    .dot.blue { background: var(--blue); box-shadow: 0 0 6px var(--blue); animation: pulse 0.9s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* Progress block */
    .progress-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      display: none;
    }
    .progress-block.show { display: block; }

    .progress-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .progress-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted);
    }
    .progress-count {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 800; color: var(--accent);
    }
    .progress-sub {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--muted); margin-top: 2px;
    }

    .progress-bar-wrap {
      background: var(--surface2);
      border-radius: 4px; height: 4px; overflow: hidden; margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .page-chips {
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: 'DM Mono', monospace;
      font-size: 9px; color: var(--muted);
      transition: all 0.2s;
    }
    .chip.done { border-color: var(--accent); color: var(--accent); }
    .chip.active { border-color: var(--blue); color: var(--blue); background: rgba(96,165,250,0.08); }

    /* Stats */
    .stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 12px;
    }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 10px; text-align: center;
    }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 18px; font-weight: 800; color: var(--accent);
      line-height: 1; margin-bottom: 3px;
    }
    .stat-label {
      font-size: 9px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      font-family: 'DM Mono', monospace;
    }

    .product-name {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 11px; margin-bottom: 12px;
      font-size: 11px; color: #999;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: none;
    }
    .product-name.show { display: block; }
    .product-name span { color: var(--text); }

    .btn-extract {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; font-family: 'Syne', sans-serif;
      font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 8px;
    }
    .btn-extract:hover { opacity: 0.9; }
    .btn-extract:active { transform: scale(0.98); }
    .btn-extract:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-stop {
      width: 100%; padding: 9px;
      background: transparent; color: var(--red);
      font-family: 'DM Mono', monospace; font-size: 11px;
      border: 1px solid var(--red); border-radius: 8px;
      cursor: pointer; margin-bottom: 8px;
      transition: background 0.15s;
      display: none;
    }
    .btn-stop:hover { background: rgba(248,113,113,0.1); }
    .btn-stop.show { display: block; }

    .export-row {
      display: none; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
    }
    .export-row.show { display: grid; }

    .btn-export {
      padding: 8px 6px;
      background: var(--surface2); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 10px;
      border: 1px solid var(--border); border-radius: 7px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      transition: border-color 0.15s, background 0.15s;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .btn-export:hover { border-color: var(--accent); background: rgba(245,166,35,0.07); color: var(--accent); }
    .btn-export .icon { font-size: 15px; }

    .preview-section { margin-top: 10px; display: none; }
    .preview-section.show { display: block; }
    .preview-header {
      font-family: 'DM Mono', monospace; font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 6px; padding-left: 2px;
    }
    .review-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 11px; margin-bottom: 5px;
    }
    .review-card:last-child { margin-bottom: 0; }
    .review-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .reviewer { font-size: 11px; font-weight: 500; }
    .stars { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); }
    .review-title-text { font-size: 11px; color: #ccc; margin-bottom: 4px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .review-body-preview { font-size: 10px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .review-date { font-family: 'DM Mono', monospace; font-size: 9px; color: #444; margin-top: 5px; }
    .preview-scroll { max-height: 200px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .not-amazon { padding: 20px 16px; text-align: center; color: var(--muted); }
    .not-amazon .emoji { font-size: 28px; margin-bottom: 8px; }
    .not-amazon p { font-size: 12px; line-height: 1.5; }
    .not-amazon strong { color: var(--text); }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">⭐</div>
  <div class="header-text">
    <h1>Review Extractor</h1>
    <p>amazon · auto-paginate all reviews</p>
  </div>
</div>
<div class="body">
  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Checking page...</span>
  </div>
  <div id="mainContent"></div>
</div>
<script src="popup.js"></script>
</body>
</html>
